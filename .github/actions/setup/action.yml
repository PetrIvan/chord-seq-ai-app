name: Setup Node and dependencies
description: Set up Node 22 with npm 11 (matching the local lockfile) and install dependencies.

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
    - name: Pin npm to match local lockfile generation
      # node 22 ships npm 10, but our lockfile is generated with npm 11, which npm 10's `npm ci` rejects.
      shell: bash
      run: npm install -g npm@11
    - name: Install dependencies
      shell: bash
      run: npm ci
